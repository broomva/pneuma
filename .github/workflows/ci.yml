name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: pneuma
      - name: Checkout sibling sensorium (path-dep)
        uses: actions/checkout@v4
        with:
          repository: broomva/sensorium
          path: sensorium
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # cpal (transitively pulled in by sensorium-voice's `audio` /
      # `parakeet` features, which `--all-features` activates) links
      # against ALSA on Linux. Ubuntu runners don't ship the dev
      # headers.
      - name: Install ALSA dev headers (Linux)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pneuma
      - name: cargo fmt --check
        working-directory: pneuma
        run: cargo fmt --all -- --check
      - name: cargo check
        working-directory: pneuma
        run: cargo check --workspace --all-targets
      - name: cargo clippy (-D warnings)
        working-directory: pneuma
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: pneuma
      - name: Checkout sibling sensorium (path-dep)
        uses: actions/checkout@v4
        with:
          repository: broomva/sensorium
          path: sensorium
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      # cpal (transitively pulled in by sensorium-voice's `audio` /
      # `parakeet` features, which `--all-features` activates) links
      # against ALSA on Linux. macOS uses CoreAudio and needs nothing
      # extra.
      - name: Install ALSA dev headers (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pneuma
      - name: cargo test
        working-directory: pneuma
        run: cargo test --workspace --all-features

  # MSRV check disabled until we ship Cargo.lock to crates.io. See note
  # in core/sensorium/.github/workflows/ci.yml.
